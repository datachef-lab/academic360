# Build and run from repository root.
#
# Prerequisites:
#   1. cp docker/compose.env.example .env   (build args + host ports)
#   2. apps/backend/.env                    (runtime — copy from .env.example)
#   3. apps/student-console/.env.local      (runtime — NOT .env)
#
#   docker compose build && docker compose up -d

name: academic360

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: academic360-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - path: apps/backend/.env
        required: true
    environment:
      NODE_ENV: production
      PORT: "8080"
      # NOTIFICATION_SYSTEM_URL / DATABASE_URL: set in apps/backend/.env
      # With --profile notifications, point NOTIFICATION_SYSTEM_URL=http://notification-system:8091
    extra_hosts:
      - "host.docker.internal:host-gateway"

  main-console:
    build:
      context: .
      dockerfile: apps/main-console/Dockerfile
      args:
        VITE_APP_BACKEND_URL: ${VITE_APP_BACKEND_URL:-http://localhost:8080}
        VITE_APP_STUDENT_CONSOLE_URL: ${VITE_APP_STUDENT_CONSOLE_URL:-http://localhost:3008}
        VITE_STUDENT_PROFILE_URL: ${VITE_STUDENT_PROFILE_URL:-}
        VITE_STUDENT_IMAGE_BASE_URL: ${VITE_STUDENT_IMAGE_BASE_URL:-https://besc.academic360.app/id-card-generate/api/images?crop=true&uid=}
        VITE_APP_PREFIX: ${VITE_APP_PREFIX:-}
    container_name: academic360-main-console
    restart: unless-stopped
    ports:
      - "${MAIN_CONSOLE_PORT:-5173}:5173"
    depends_on:
      - backend

  student-console:
    build:
      context: .
      dockerfile: apps/student-console/Dockerfile
      args:
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3008}
    container_name: academic360-student-console
    restart: unless-stopped
    ports:
      - "${STUDENT_CONSOLE_PORT:-3008}:3000"
    env_file:
      - path: apps/student-console/.env.local
        required: true
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  notification-system:
    profiles: ["notifications"]
    build:
      context: .
      dockerfile: apps/notification-system/Dockerfile
    container_name: academic360-notification-system
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SYSTEM_PORT:-8091}:${NOTIFICATION_SYSTEM_PORT:-8091}"
    env_file:
      - path: apps/notification-system/.env
        required: true
    environment:
      NODE_ENV: production
      NOTIFICATION_SYSTEM_PORT: "${NOTIFICATION_SYSTEM_PORT:-8091}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    profiles: ["db"]
    image: postgres:16-alpine
    container_name: academic360-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-academic360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academic360}
      POSTGRES_DB: ${POSTGRES_DB:-academic360}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-academic360}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
