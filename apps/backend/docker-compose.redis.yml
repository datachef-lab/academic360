# Local Redis for multi-instance dev (sessions, Socket.IO adapter, password-reset tokens).
# Usage: docker compose -f docker-compose.redis.yml up -d
# Then set REDIS_URL=redis://localhost:6379 in .env

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
