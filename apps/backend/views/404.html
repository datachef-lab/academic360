<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Not Found</title>
    <!-- Inlined so this page works when opened under any path prefix (e.g. /backend/api/...) without relying on /css/style.css at the site root -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      h1 {
        font-size: clamp(2rem, 8vw, 4rem);
        margin: 12px 0;
      }
      body {
        color: #fff;
        background-color: #000;
        width: 100%;
        min-height: 100vh;
      }
      body.page-404 {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .container {
        width: min(75%, 32rem);
        padding: 12px;
        text-align: center;
        font-size: 18px;
      }
      body.page-404 .container {
        height: auto;
        padding-top: 12px;
      }
      .my-2 {
        margin: 8px 0;
      }
    </style>
  </head>
  <body class="page-404">
    <div class="container">
      <h1>Sorry!</h1>
      <p class="my-2">The resource you have requested does not exist.</p>
    </div>
  </body>
</html>
