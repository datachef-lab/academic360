name: Alpha Release

on:
  push:
    tags:
      - 'v*-alpha.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Alpha Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "🧪 Alpha ${{ github.ref_name }}"
          prerelease: true
          generate_release_notes: true